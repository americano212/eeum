services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.25
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-eeum}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-eeum}"
      POSTGRES_DB: "${POSTGRES_DB:-eeum}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eeum} -d ${POSTGRES_DB:-eeum}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      QDRANT_URL: "http://qdrant:6333"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-password}"
      REDIS_URL: "redis://redis:6379/0"
      POSTGRES_DSN: "postgresql://${POSTGRES_USER:-eeum}:${POSTGRES_PASSWORD:-eeum}@postgres:5432/${POSTGRES_DB:-eeum}"
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  qdrant_data:
  neo4j_data:
  redis_data:
  postgres_data:
