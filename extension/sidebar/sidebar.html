<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM Semantic Navigator</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div id="app">

    <!-- 헤더 -->
    <header>
      <div class="header-left">
        <span class="logo-icon">🧭</span>
        <span class="logo-text">DOM Navigator</span>
      </div>
      <div class="header-actions">
        <button id="history-btn" title="대화 내역" aria-label="대화 내역">📋</button>
        <button id="clear-btn" title="세션 초기화" aria-label="세션 초기화">🗑</button>
        <button id="settings-btn" title="서버 설정" aria-label="설정">⚙</button>
      </div>
    </header>

    <!-- 대화 내역 패널 -->
    <div id="history-panel" class="hidden">
      <div class="history-header">
        <h3>대화 내역</h3>
        <button id="new-session-btn" title="새 대화" aria-label="새 대화">+</button>
      </div>
      <ul id="session-list">
        <li class="session-empty">불러오는 중...</li>
      </ul>
    </div>

    <!-- 설정 패널 (서버 URL) -->
    <div id="settings-panel" class="hidden">
      <div class="settings-inner">
        <h3>서버 설정</h3>
        <p class="settings-hint">
          기본값은 <code>extension/config.js</code> 의 <code>SERVER_URL</code> 입니다. 임시로 다른 서버를 가리키려면 아래에서 변경하세요.
        </p>
        <div class="input-group">
          <input
            type="text"
            id="server-url-input"
            placeholder="http://localhost:8000"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="settings-actions">
          <button id="save-server-btn" class="btn-primary">저장</button>
          <button id="reset-server-btn" class="btn-secondary">기본값</button>
        </div>
        <p id="server-status" class="hidden"></p>
      </div>
    </div>

    <!-- 채팅 메시지 영역 -->
    <div id="messages" role="log" aria-live="polite">
      <div class="msg-bubble assistant" id="welcome-msg">
        안녕하세요! DOM Semantic Navigator 입니다.<br><br>
        자연어로 "~하고 싶어"라고 말씀해주시면 현재 사이트에서 어떤 요소를 어떤 경로로 조작해야 하는지 찾아 실행해드립니다.<br><br>
        <strong>예시:</strong><br>
        • 결제 플랜 변경하고 싶어<br>
        • 로그아웃 버튼 찾아줘<br>
        • 알림 설정 켜고 싶어
      </div>
    </div>

    <!-- 진행 상황 표시 바 -->
    <div id="progress-bar" class="hidden">
      <div id="progress-fill"></div>
    </div>

    <!-- 빠른 명령어 칩 -->
    <div id="quick-chips">
      <button class="chip">현재 페이지 설명해줘</button>
      <button class="chip">로그인 버튼 찾아줘</button>
      <button class="chip">설정 페이지로 가고 싶어</button>
      <button class="chip">결제 플랜 변경하고 싶어</button>
    </div>

    <!-- 입력 영역 -->
    <div id="input-area">
      <div class="textarea-wrapper">
        <textarea
          id="user-input"
          placeholder="무엇을 하고 싶으세요? (Enter 전송, Shift+Enter 줄바꿈)"
          rows="2"
          maxlength="500"
        ></textarea>
      </div>
      <div id="button-row">
        <button id="send-btn" class="btn-primary" title="전송 (Enter)">
          <span>전송</span>
          <span class="btn-icon">↑</span>
        </button>
        <button id="stop-btn" class="btn-danger hidden" title="자동화 중지">
          <span>중지</span>
          <span class="btn-icon">✕</span>
        </button>
      </div>
    </div>

  </div>

  <script src="sidebar.js"></script>
</body>
</html>
