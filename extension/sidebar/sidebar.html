<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM Semantic Navigator</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div id="app">

    <!-- 헤더 -->
    <header>
      <div class="header-left">
        <span class="logo-icon">🧭</span>
        <span class="logo-text">DOM Navigator</span>
      </div>
      <div class="header-actions">
        <button id="explore-btn" class="explore-off" title="탐색 모드 (DB 채우기)">OFF</button>
        <button id="clear-btn" title="세션 초기화" aria-label="세션 초기화">🗑</button>
        <button id="settings-btn" title="설정" aria-label="설정">⚙</button>
      </div>
    </header>

    <!-- 설정 패널 (플래닝 엔드포인트) -->
    <div id="settings-panel" class="hidden">
      <div class="settings-inner">
        <h3>플래닝 엔드포인트</h3>
        <p class="settings-hint">
          사이드패널 입력이 보내질 서버 엔드포인트. 기본값은 <code>/plan/strict</code>.
        </p>
        <div class="input-group">
          <select id="endpoint-select">
            <option value="/plan/strict">POST /plan/strict — 안전 규칙 + 클릭 대기 (기본)</option>
            <option value="/plan">POST /plan — flat 프롬프트, 자동 클릭</option>
            <option value="/query">POST /query — 임베딩 + 그래프 (레거시)</option>
          </select>
        </div>
        <div class="settings-actions">
          <button id="save-endpoint-btn" class="btn-primary">저장</button>
          <button id="reset-endpoint-btn" class="btn-secondary">기본값</button>
        </div>
        <p id="endpoint-status" class="hidden"></p>

        <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">

        <h3>DB 상태</h3>
        <p id="db-stats" class="settings-hint">로딩 중…</p>
        <div class="settings-actions">
          <button id="refresh-stats-btn" class="btn-secondary">새로고침</button>
          <button id="reset-db-btn" class="btn-danger">DB 비우기</button>
        </div>
        <p id="db-status" class="hidden"></p>
      </div>
    </div>

    <!-- 채팅 메시지 영역 -->
    <div id="messages" role="log" aria-live="polite">
      <div class="msg-bubble assistant" id="welcome-msg">
        안녕하세요! DOM Semantic Navigator 입니다.<br><br>
        자연어로 "~하고 싶어"라고 말씀해주시면 현재 사이트에서 어떤 요소를 어떤 경로로 조작해야 하는지 찾아 실행해드립니다.<br><br>
        <strong>예시:</strong><br>
        • 결제 플랜 변경하고 싶어<br>
        • 로그아웃 버튼 찾아줘<br>
        • 알림 설정 켜고 싶어
      </div>
    </div>

    <!-- 진행 상황 표시 바 -->
    <div id="progress-bar" class="hidden">
      <div id="progress-fill"></div>
    </div>

    <!-- 빠른 명령어 칩 -->
    <div id="quick-chips">
      <button class="chip">현재 페이지 설명해줘</button>
      <button class="chip">로그인 버튼 찾아줘</button>
      <button class="chip">설정 페이지로 가고 싶어</button>
      <button class="chip">결제 플랜 변경하고 싶어</button>
    </div>

    <!-- 입력 영역 -->
    <div id="input-area">
      <div class="textarea-wrapper">
        <textarea
          id="user-input"
          placeholder="무엇을 하고 싶으세요? (Enter 전송, Shift+Enter 줄바꿈)"
          rows="2"
          maxlength="500"
        ></textarea>
      </div>
      <div id="button-row">
        <button id="send-btn" class="btn-primary" title="전송 (Enter)">
          <span>전송</span>
          <span class="btn-icon">↑</span>
        </button>
        <button id="stop-btn" class="btn-danger hidden" title="자동화 중지">
          <span>중지</span>
          <span class="btn-icon">✕</span>
        </button>
      </div>
    </div>

  </div>

  <script src="sidebar.js"></script>
</body>
</html>
