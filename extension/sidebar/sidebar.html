<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM Semantic Navigator</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div id="app">

    <!-- 헤더 -->
    <header>
      <div class="header-left">
        <span class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M15.5 8.5l-2.2 4.8-4.8 2.2 2.2-4.8 4.8-2.2z"></path>
          </svg>
        </span>
        <span class="logo-text">DOM Navigator</span>
      </div>
      <div class="header-actions">
        <button id="history-btn" title="대화 내역" aria-label="대화 내역">
          <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 6h13"></path>
            <path d="M8 12h13"></path>
            <path d="M8 18h13"></path>
            <path d="M3 6h.01"></path>
            <path d="M3 12h.01"></path>
            <path d="M3 18h.01"></path>
          </svg>
        </button>
        <button id="clear-btn" title="세션 초기화" aria-label="세션 초기화">
          <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M19 6l-1 14H6L5 6"></path>
            <path d="M10 11v5"></path>
            <path d="M14 11v5"></path>
          </svg>
        </button>
        <button id="settings-btn" title="설정" aria-label="설정">
          <svg class="header-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.1 2.1 0 0 1-2.97 2.97l-.04-.04A1.8 1.8 0 0 0 14.8 19.6a1.8 1.8 0 0 0-1.08 1.65V21a2.1 2.1 0 0 1-4.2 0v-.06A1.8 1.8 0 0 0 8.45 19.3a1.8 1.8 0 0 0-1.98.36l-.04.04a2.1 2.1 0 0 1-2.97-2.97l.04-.04A1.8 1.8 0 0 0 3.86 15a1.8 1.8 0 0 0-1.65-1.08H2a2.1 2.1 0 0 1 0-4.2h.06A1.8 1.8 0 0 0 3.7 8.65a1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.1 2.1 0 0 1 2.97-2.97l.04.04A1.8 1.8 0 0 0 8 4.06a1.8 1.8 0 0 0 1.08-1.65V2a2.1 2.1 0 0 1 4.2 0v.06A1.8 1.8 0 0 0 14.35 3.7a1.8 1.8 0 0 0 1.98-.36l.04-.04a2.1 2.1 0 0 1 2.97 2.97l-.04.04A1.8 1.8 0 0 0 19.6 8a1.8 1.8 0 0 0 1.65 1.08H22a2.1 2.1 0 0 1 0 4.2h-.06A1.8 1.8 0 0 0 19.4 15z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="status-strip" class="status-ready" aria-live="polite">
      <span class="status-dot"></span>
      <span id="status-text">준비됨</span>
    </div>

    <!-- 대화 내역 패널 -->
    <div id="history-panel" class="hidden">
      <div class="history-header">
        <h3>대화 내역</h3>
        <button id="new-session-btn" title="새 대화" aria-label="새 대화">+</button>
      </div>
      <ul id="session-list">
        <li class="session-empty">불러오는 중...</li>
      </ul>
    </div>

    <!-- 설정 패널 (엔드포인트 + DB) -->
    <div id="settings-panel" class="hidden">
      <div class="settings-inner">
        <h3>플래닝 엔드포인트</h3>
        <p class="settings-hint">
          사이드패널 입력이 보내질 서버 엔드포인트. 기본값은 <code>/plan</code>(자동 실행 + 안전 게이트).
        </p>
        <div class="input-group">
          <select id="endpoint-select">
            <option value="/plan">POST /plan — 자동 실행 + 안전 게이트 (기본)</option>
            <option value="/plan/strict">POST /plan/strict — 모든 액션 사용자 확인</option>
            <option value="/query">POST /query — 임베딩 + 그래프 (레거시)</option>
          </select>
        </div>
        <div class="settings-actions">
          <button id="save-endpoint-btn" class="btn-primary">저장</button>
          <button id="reset-endpoint-btn" class="btn-secondary">기본값</button>
        </div>
        <p id="endpoint-status" class="hidden"></p>

        <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">

        <h3>DB 상태</h3>
        <p id="db-stats" class="settings-hint">로딩 중…</p>
        <div class="settings-actions">
          <button id="refresh-stats-btn" class="btn-secondary">새로고침</button>
          <button id="reset-db-btn" class="btn-danger">DB 비우기</button>
        </div>
        <p id="db-status" class="hidden"></p>
      </div>
    </div>

    <!-- 채팅 메시지 영역 -->
    <div id="messages" role="log" aria-live="polite">
      <div class="msg-bubble assistant" id="welcome-msg">
        안녕하세요! DOM Semantic Navigator 입니다.<br><br>
        자연어로 "~하고 싶어"라고 말씀해주시면 현재 사이트에서 어떤 요소를 어떤 경로로 조작해야 하는지 찾아 실행해드립니다.<br><br>
        <strong>예시:</strong><br>
        • 결제 플랜 변경하고 싶어<br>
        • 로그아웃 버튼 찾아줘<br>
        • 알림 설정 켜고 싶어
      </div>
    </div>

    <!-- 진행 상황 표시 바 -->
    <div id="progress-bar" class="hidden">
      <div id="progress-fill"></div>
    </div>

    <!-- 빠른 명령어 칩 -->
    <div id="quick-chips">
      <button class="chip">현재 페이지 설명해줘</button>
      <button class="chip">로그인 버튼 찾아줘</button>
      <button class="chip">설정 페이지로 가고 싶어</button>
      <button class="chip">결제 플랜 변경하고 싶어</button>
    </div>

    <!-- 입력 영역 -->
    <div id="input-area">
      <div class="textarea-wrapper">
        <textarea
          id="user-input"
          placeholder="무엇을 하고 싶으세요? (Enter 전송, Shift+Enter 줄바꿈)"
          rows="2"
          maxlength="500"
        ></textarea>
        <div id="input-meta">
          <span id="char-count">0/500</span>
        </div>
      </div>
      <div id="button-row">
        <button id="send-btn" class="btn-primary" title="전송 (Enter)">
          <span>전송</span>
          <span class="btn-icon">↑</span>
        </button>
        <button id="stop-btn" class="btn-danger hidden" title="자동화 중지">
          <span>중지</span>
          <span class="btn-icon">✕</span>
        </button>
      </div>
    </div>

  </div>

  <script src="sidebar.js"></script>
</body>
</html>
