name: eval

on:
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/eval.yml'
  workflow_dispatch:
    inputs:
      include_dynamic:
        description: '동적 평가도 실행 (Playwright)'
        type: boolean
        default: false

jobs:
  static-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run static eval (inproc — no server needed)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m eval.run_eval \
            --static --mode inproc \
            --n-runs 1 \
            --report ../eval-report.md \
            --raw ../eval-raw.json \
            --threshold 0.8

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            eval-report.md
            eval-raw.json

      - name: PR comment
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: eeum-eval
          path: eval-report.md

  dynamic-eval:
    if: github.event_name == 'workflow_dispatch' && inputs.include_dynamic
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install deps + Playwright browsers
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Start server stack
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          docker compose up -d --build
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              echo "server up"; break
            fi
            sleep 2
          done

      - name: Run dynamic eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python -m eval.run_eval \
            --dynamic \
            --base-url http://localhost:8000 \
            --report ../eval-dynamic.md \
            --raw ../eval-dynamic-raw.json \
            --threshold 0.5

      - name: Stop server
        if: always()
        run: docker compose down -v

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-dynamic
          path: |
            eval-dynamic.md
            eval-dynamic-raw.json
